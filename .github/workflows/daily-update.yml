name: Daily News Fetch

on:
  schedule:
    # 23:00 UTC = 08:00 KST
    - cron: '0 23 * * *'
  workflow_dispatch:   # manual trigger from refresh button / GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run news fetch script (CI-safe, no Puppeteer)
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: node scripts/fetch-news-ci.mjs

    - name: Commit and push data.json
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Actions"
        git add public/data.json
        git diff --staged --quiet || git commit -m "chore: update news data $(date -u +'%Y-%m-%d %H:%M UTC') [skip ci]"
        git push
